workflows:
  default:
    name: Default Workflow
    scripts:
      - name: Unzip and rebuild project
        script: |
          set -e
          echo "===== Current directory contents ====="
          ls -la

          echo "===== Extracting OCRTool.zip ====="
          unzip -o OCRTool.zip -d extracted

          # 创建项目结构
          mkdir -p app/src/main

          echo "===== Copying Kotlin source files preserving package structure ====="
          JAVA_SRC=$(find extracted -type d -name "java" | head -n 1)
          if [ -n "$JAVA_SRC" ]; then
            cp -r "$JAVA_SRC" app/src/main/
            echo "Copied Java sources from $JAVA_SRC"
          else
            echo "No Java source found, exiting"
            exit 1
          fi

          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-hdpi

          echo "===== Generating activity_main.xml ====="
          printf '%s\n' \
            "<?xml version=\"1.0\" encoding=\"utf-8\"?>" \
            "<LinearLayout xmlns:android=\"http://schemas.android.com/apk/res/android\"" \
            "    xmlns:app=\"http://schemas.android.com/apk/res-auto\"" \
            "    android:layout_width=\"match_parent\"" \
            "    android:layout_height=\"match_parent\"" \
            "    android:orientation=\"vertical\"" \
            "    android:padding=\"12dp\">" \
            "    <LinearLayout android:layout_width=\"match_parent\" android:layout_height=\"wrap_content\"" \
            "        android:orientation=\"horizontal\" android:gravity=\"center_vertical\"" \
            "        android:layout_marginBottom=\"8dp\">" \
            "        <Button android:id=\"@+id/btnSelectImages\" android:layout_width=\"0dp\"" \
            "            android:layout_height=\"wrap_content\" android:layout_weight=\"1\"" \
            "            android:text=\"选择图片\" android:layout_marginEnd=\"4dp\" />" \
            "        <Button android:id=\"@+id/btnClear\" android:layout_width=\"0dp\"" \
            "            android:layout_height=\"wrap_content\" android:layout_weight=\"1\"" \
            "            android:text=\"清空\" android:layout_marginStart=\"4dp\" />" \
            "    </LinearLayout>" \
            "    <LinearLayout android:layout_width=\"match_parent\" android:layout_height=\"wrap_content\"" \
            "        android:orientation=\"horizontal\" android:layout_marginBottom=\"8dp\">" \
            "        <Button android:id=\"@+id/btnGlobalFilter\" android:layout_width=\"0dp\"" \
            "            android:layout_height=\"wrap_content\" android:layout_weight=\"1\"" \
            "            android:text=\"全局屏蔽词\" android:layout_marginEnd=\"4dp\" />" \
            "        <Button android:id=\"@+id/btnImageFilter\" android:layout_width=\"0dp\"" \
            "            android:layout_height=\"wrap_content\" android:layout_weight=\"1\"" \
            "            android:text=\"本图屏蔽词\" android:layout_marginStart=\"4dp\" />" \
            "    </LinearLayout>" \
            "    <LinearLayout android:layout_width=\"match_parent\" android:layout_height=\"0dp\"" \
            "        android:layout_weight=\"1\" android:orientation=\"horizontal\">" \
            "        <androidx.cardview.widget.CardView android:layout_width=\"150dp\"" \
            "            android:layout_height=\"match_parent\" app:cardElevation=\"4dp\"" \
            "            android:layout_marginEnd=\"8dp\">" \
            "            <LinearLayout android:layout_width=\"match_parent\"" \
            "                android:layout_height=\"match_parent\" android:orientation=\"vertical\">" \
            "                <TextView android:layout_width=\"match_parent\"" \
            "                    android:layout_height=\"wrap_content\" android:text=\"图片列表\"" \
            "                    android:textSize=\"16sp\" android:textStyle=\"bold\" android:padding=\"8dp\"" \
            "                    android:background=\"#FF018786\" android:textColor=\"@android:color/white\" />" \
            "                <TextView android:id=\"@+id/tvImageCount\" android:layout_width=\"match_parent\"" \
            "                    android:layout_height=\"wrap_content\" android:text=\"已选 0 张\"" \
            "                    android:padding=\"4dp\" android:gravity=\"center\" />" \
            "                <androidx.recyclerview.widget.RecyclerView android:id=\"@+id/recyclerView\"" \
            "                    android:layout_width=\"match_parent\" android:layout_height=\"0dp\"" \
            "                    android:layout_weight=\"1\" />" \
            "            </LinearLayout>" \
            "        </androidx.cardview.widget.CardView>" \
            "        <androidx.cardview.widget.CardView android:layout_width=\"0dp\"" \
            "            android:layout_height=\"match_parent\" android:layout_weight=\"1\"" \
            "            app:cardElevation=\"4dp\">" \
            "            <LinearLayout android:layout_width=\"match_parent\"" \
            "                android:layout_height=\"match_parent\" android:orientation=\"vertical\">" \
            "                <TextView android:layout_width=\"match_parent\"" \
            "                    android:layout_height=\"wrap_content\" android:text=\"识别结果\"" \
            "                    android:textSize=\"16sp\" android:textStyle=\"bold\" android:padding=\"8dp\"" \
            "                    android:background=\"#FF018786\" android:textColor=\"@android:color/white\" />" \
            "                <TextView android:id=\"@+id/tvFilterInfo\" android:layout_width=\"match_parent\"" \
            "                    android:layout_height=\"wrap_content\" android:text=\"当前图片屏蔽词信息\"" \
            "                    android:textSize=\"12sp\" android:padding=\"4dp\"" \
            "                    android:textColor=\"#FF6200EE\" />" \
            "                <ScrollView android:layout_width=\"match_parent\" android:layout_height=\"0dp\"" \
            "                    android:layout_weight=\"1\">" \
            "                    <TextView android:id=\"@+id/tvResult\" android:layout_width=\"match_parent\"" \
            "                        android:layout_height=\"wrap_content\" android:padding=\"8dp\"" \
            "                        android:textSize=\"14sp\" android:lineSpacingExtra=\"2dp\" />" \
            "                </ScrollView>" \
            "            </LinearLayout>" \
            "        </androidx.cardview.widget.CardView>" \
            "    </LinearLayout>" \
            "    <LinearLayout android:layout_width=\"match_parent\" android:layout_height=\"wrap_content\"" \
            "        android:orientation=\"horizontal\" android:layout_marginTop=\"8dp\"" \
            "        android:gravity=\"center\">" \
            "        <Button android:id=\"@+id/btnRecognize\" android:layout_width=\"0dp\"" \
            "            android:layout_height=\"wrap_content\" android:layout_weight=\"2\"" \
            "            android:text=\"开始批量识别\" android:backgroundTint=\"#FF4CAF50\"" \
            "            android:textColor=\"@android:color/white\" android:layout_marginEnd=\"4dp\" />" \
            "        <Button android:id=\"@+id/btnCopyAll\" android:layout_width=\"0dp\"" \
            "            android:layout_weight=\"1\" android:layout_height=\"wrap_content\"" \
            "            android:text=\"复制全部\" android:layout_marginEnd=\"4dp\" />" \
            "        <Button android:id=\"@+id/btnExport\" android:layout_width=\"0dp\"" \
            "            android:layout_weight=\"1\" android:layout_height=\"wrap_content\"" \
            "            android:text=\"导出TXT\" />" \
            "    </LinearLayout>" \
            "    <TextView android:id=\"@+id/tvStatus\" android:layout_width=\"match_parent\"" \
            "        android:layout_height=\"wrap_content\" android:text=\"就绪\" android:padding=\"4dp\"" \
            "        android:background=\"#FF555555\" android:textColor=\"@android:color/white\"" \
            "        android:layout_marginTop=\"4dp\" />" \
            "    <ProgressBar android:id=\"@+id/progressBar\" android:layout_width=\"match_parent\"" \
            "        android:layout_height=\"wrap_content\" style=\"?android:attr/progressBarStyleHorizontal\"" \
            "        android:indeterminate=\"true\" android:visibility=\"gone\" />" \
            "</LinearLayout>" > app/src/main/res/layout/activity_main.xml

          echo "===== Generating item_image.xml ====="
          printf '%s\n' \
            "<?xml version=\"1.0\" encoding=\"utf-8\"?>" \
            "<LinearLayout xmlns:android=\"http://schemas.android.com/apk/res/android\"" \
            "    android:layout_width=\"match_parent\" android:layout_height=\"80dp\"" \
            "    android:orientation=\"horizontal\" android:padding=\"8dp\"" \
            "    android:background=\"?selectableItemBackground\">" \
            "    <ImageView android:id=\"@+id/ivThumb\" android:layout_width=\"60dp\"" \
            "        android:layout_height=\"60dp\" android:scaleType=\"centerCrop\"" \
            "        android:src=\"@drawable/ic_image_placeholder\" />" \
            "    <TextView android:id=\"@+id/tvIndex\" android:layout_width=\"wrap_content\"" \
            "        android:layout_height=\"wrap_content\" android:layout_gravity=\"center_vertical\"" \
            "        android:layout_marginStart=\"16dp\" android:textSize=\"16sp\"" \
            "        android:textColor=\"@android:color/black\" android:text=\"1\" />" \
            "    <View android:layout_width=\"1dp\" android:layout_height=\"match_parent\"" \
            "        android:layout_marginStart=\"16dp\" android:background=\"@android:color/darker_gray\" />" \
            "</LinearLayout>" > app/src/main/res/layout/item_image.xml

          echo "===== Generating file_paths.xml ====="
          printf '%s\n' \
            "<?xml version=\"1.0\" encoding=\"utf-8\"?>" \
            "<paths>" \
            "    <external-path name=\"external\" path=\".\" />" \
            "    <external-files-path name=\"external_files\" path=\".\" />" \
            "    <cache-path name=\"cache\" path=\".\" />" \
            "    <external-cache-path name=\"external_cache\" path=\".\" />" \
            "</paths>" > app/src/main/res/xml/file_paths.xml

          echo "===== Generating strings.xml ====="
          printf '%s\n' \
            "<?xml version=\"1.0\" encoding=\"utf-8\"?>" \
            "<resources>" \
            "    <string name=\"app_name\">OCR工具</string>" \
            "</resources>" > app/src/main/res/values/strings.xml

          echo "===== Generating placeholder icon ====="
          echo "R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" | base64 -d > app/src/main/res/mipmap-hdpi/ic_launcher.png

          echo "===== Generating AndroidManifest.xml ====="
          printf '%s\n' \
            "<?xml version=\"1.0\" encoding=\"utf-8\"?>" \
            "<manifest xmlns:android=\"http://schemas.android.com/apk/res/android\"" \
            "    package=\"com.example.ocr\">" \
            "    <uses-permission android:name=\"android.permission.READ_EXTERNAL_STORAGE\" />" \
            "    <uses-permission android:name=\"android.permission.WRITE_EXTERNAL_STORAGE\"" \
            "        android:maxSdkVersion=\"28\" />" \
            "    <uses-permission android:name=\"android.permission.CAMERA\" />" \
            "    <application android:allowBackup=\"true\"" \
            "        android:icon=\"@mipmap/ic_launcher\"" \
            "        android:label=\"@string/app_name\"" \
            "        android:theme=\"@style/Theme.AppCompat.Light\">" \
            "        <activity android:name=\".MainActivity\" android:exported=\"true\">" \
            "            <intent-filter>" \
            "                <action android:name=\"android.intent.action.MAIN\" />" \
            "                <category android:name=\"android.intent.category.LAUNCHER\" />" \
            "            </intent-filter>" \
            "        </activity>" \
            "    </application>" \
            "</manifest>" > app/src/main/AndroidManifest.xml

          echo "===== Generating Gradle files ====="
          printf '%s\n' \
            "buildscript {" \
            "    repositories { google() mavenCentral() maven { url 'https://jitpack.io' } }" \
            "    dependencies {" \
            "        classpath 'com.android.tools.build:gradle:8.2.0'" \
            "        classpath \"org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.0\"" \
            "    }" \
            "}" \
            "tasks.register('clean', Delete) { delete rootProject.buildDir }" > build.gradle

          printf '%s\n' \
            "plugins { id 'com.android.application' id 'org.jetbrains.kotlin.android' }" \
            "android {" \
            "    namespace 'com.example.ocr'" \
            "    compileSdk 34" \
            "    defaultConfig {" \
            "        applicationId \"com.example.ocr\"" \
            "        minSdk 24 targetSdk 34 versionCode 1 versionName \"1.0\"" \
            "    }" \
            "    buildTypes { release { minifyEnabled false proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro' } }" \
            "    compileOptions { sourceCompatibility JavaVersion.VERSION_1_8 targetCompatibility JavaVersion.VERSION_1_8 }" \
            "    kotlinOptions { jvmTarget = '1.8' }" \
            "    buildFeatures { viewBinding true }" \
            "}" \
            "dependencies {" \
            "    implementation 'androidx.core:core-ktx:1.12.0'" \
            "    implementation 'androidx.appcompat:appcompat:1.6.1'" \
            "    implementation 'com.google.android.material:material:1.11.0'" \
            "    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'" \
            "    implementation 'androidx.recyclerview:recyclerview:1.3.2'" \
            "    implementation 'com.google.mlkit:text-recognition-chinese:16.0.0'" \
            "    implementation 'com.google.mlkit:text-recognition:16.0.0'" \
            "    implementation 'com.github.dhaval2404:imagepicker:2.1'" \
            "    implementation 'com.github.bumptech.glide:glide:4.16.0'" \
            "    implementation 'com.google.code.gson:gson:2.10.1'" \
            "}" > app/build.gradle

          printf '%s\n' \
            "pluginManagement { repositories { google() mavenCentral() gradlePluginPortal() maven { url 'https://jitpack.io' } } }" \
            "dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS) repositories { google() mavenCentral() maven { url 'https://jitpack.io' } } }" \
            "rootProject.name = \"OCRTool\"" \
            "include ':app'" > settings.gradle

          printf '%s\n' \
            "# Project-wide Gradle settings" \
            "org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8" \
            "android.useAndroidX=true" \
            "android.enableJetifier=true" \
            "kotlin.code.style=official" > gradle.properties

          echo "===== Project structure created, starting build ====="
          gradle assembleRelease --stacktrace
    artifacts:
      - "app/build/outputs/**/**/*.apk"
