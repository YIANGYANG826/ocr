workflows:
  default:
    name: Default Workflow
    scripts:
      - name: Unzip and build
        script: |
          set -e
          echo "===== Current directory contents ====="
          ls -la

          echo "===== Extracting OCRTool.zip ====="
          unzip -o OCRTool.zip -d extracted

          cd extracted/OCRTool
          echo "===== Project root contents ====="
          ls -la

          echo "===== Writing correct Gradle files ====="

          # Write root build.gradle
          printf '%s\n' \
            "buildscript {" \
            "    repositories {" \
            "        google()" \
            "        mavenCentral()" \
            "        maven { url 'https://jitpack.io' }" \
            "    }" \
            "    dependencies {" \
            "        classpath 'com.android.tools.build:gradle:8.2.0'" \
            "        classpath \"org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.0\"" \
            "    }" \
            "}" \
            "" \
            "tasks.register('clean', Delete) {" \
            "    delete rootProject.buildDir" \
            "}" > build.gradle

          # Write app/build.gradle
          mkdir -p app
          printf '%s\n' \
            "plugins {" \
            "    id 'com.android.application'" \
            "    id 'org.jetbrains.kotlin.android'" \
            "}" \
            "" \
            "android {" \
            "    namespace 'com.example.ocr'" \
            "    compileSdk 34" \
            "" \
            "    defaultConfig {" \
            "        applicationId \"com.example.ocr\"" \
            "        minSdk 24" \
            "        targetSdk 34" \
            "        versionCode 1" \
            "        versionName \"1.0\"" \
            "    }" \
            "" \
            "    buildTypes {" \
            "        release {" \
            "            minifyEnabled false" \
            "            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'" \
            "        }" \
            "    }" \
            "    compileOptions {" \
            "        sourceCompatibility JavaVersion.VERSION_1_8" \
            "        targetCompatibility JavaVersion.VERSION_1_8" \
            "    }" \
            "    kotlinOptions {" \
            "        jvmTarget = '1.8'" \
            "    }" \
            "    buildFeatures {" \
            "        viewBinding true" \
            "    }" \
            "}" \
            "" \
            "dependencies {" \
            "    implementation 'androidx.core:core-ktx:1.12.0'" \
            "    implementation 'androidx.appcompat:appcompat:1.6.1'" \
            "    implementation 'com.google.android.material:material:1.11.0'" \
            "    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'" \
            "    implementation 'androidx.recyclerview:recyclerview:1.3.2'" \
            "    implementation 'com.google.mlkit:text-recognition-chinese:16.0.0'" \
            "    implementation 'com.google.mlkit:text-recognition:16.0.0'" \
            "    implementation 'com.github.dhaval2404:imagepicker:2.1'" \
            "    implementation 'com.github.bumptech.glide:glide:4.16.0'" \
            "    implementation 'com.google.code.gson:gson:2.10.1'" \
            "}" > app/build.gradle

          # Write settings.gradle
          printf '%s\n' \
            "pluginManagement {" \
            "    repositories {" \
            "        google()" \
            "        mavenCentral()" \
            "        gradlePluginPortal()" \
            "        maven { url 'https://jitpack.io' }" \
            "    }" \
            "}" \
            "dependencyResolutionManagement {" \
            "    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)" \
            "    repositories {" \
            "        google()" \
            "        mavenCentral()" \
            "        maven { url 'https://jitpack.io' }" \
            "    }" \
            "}" \
            "rootProject.name = \"OCRTool\"" \
            "include ':app'" > settings.gradle

          # Write gradle.properties
          printf '%s\n' \
            "# Project-wide Gradle settings" \
            "org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8" \
            "android.useAndroidX=true" \
            "android.enableJetifier=true" \
            "kotlin.code.style=official" > gradle.properties

          # Write correct AndroidManifest.xml using printf
          mkdir -p app/src/main
          printf '%s\n' \
            "<?xml version=\"1.0\" encoding=\"utf-8\"?>" \
            "<manifest xmlns:android=\"http://schemas.android.com/apk/res/android\"" \
            "    package=\"com.example.ocr\">" \
            "" \
            "    <uses-permission android:name=\"android.permission.READ_EXTERNAL_STORAGE\" />" \
            "    <uses-permission android:name=\"android.permission.WRITE_EXTERNAL_STORAGE\"" \
            "        android:maxSdkVersion=\"28\" />" \
            "    <uses-permission android:name=\"android.permission.CAMERA\" />" \
            "" \
            "    <application" \
            "        android:allowBackup=\"true\"" \
            "        android:icon=\"@mipmap/ic_launcher\"" \
            "        android:label=\"@string/app_name\"" \
            "        android:theme=\"@style/Theme.AppCompat.Light\">" \
            "        <activity" \
            "            android:name=\".MainActivity\"" \
            "            android:exported=\"true\">" \
            "            <intent-filter>" \
            "                <action android:name=\"android.intent.action.MAIN\" />" \
            "                <category android:name=\"android.intent.category.LAUNCHER\" />" \
            "            </intent-filter>" \
            "        </activity>" \
            "    </application>" \
            "</manifest>" > app/src/main/AndroidManifest.xml

          echo "===== Files written, starting build ====="
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew assembleRelease --stacktrace
          else
            gradle assembleRelease --stacktrace
          fi
    artifacts:
      - "extracted/**/app/build/outputs/**/**/*.apk"
