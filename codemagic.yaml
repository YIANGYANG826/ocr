workflows:
  default:
    name: Default Workflow
    scripts:
      - name: Find project root and build
        script: |
          # 查找 build.gradle 文件所在目录
          BUILD_GRADLE=$(find . -name "build.gradle" -type f | head -n 1)
          if [ -z "$BUILD_GRADLE" ]; then
            echo "错误：找不到 build.gradle 文件"
            exit 1
          fi
          PROJECT_DIR=$(dirname "$BUILD_GRADLE")
          echo "项目目录: $PROJECT_DIR"
          cd "$PROJECT_DIR"
          # 使用系统 gradle 构建
          gradle assembleRelease
    artifacts:
      - "**/app/build/outputs/**/**/*.apk"
